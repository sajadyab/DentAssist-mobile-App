<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" width="100%" height="100%">
    <defs>
        <style>
            .tooth {
            fill: #28a745;
            stroke: #000;
            stroke-width: 1.4;
            stroke-linejoin: round;
            transition: fill 0.2s, stroke-width 0.2s;
            cursor: pointer;
            }
            .tooth-number {
            font-family: Arial, sans-serif;
            font-size: 44px;
            font-weight: bold;
            fill: #6f6f6f;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            }
            .healthy { fill: #28a745; }
            .cavity { fill: #fd7e14; }
            .filled { fill: #007bff; }
            .crown { fill: #6f42c1; }
            .root-canal { fill: #ffc107; }
            .missing { fill: #6c757d; }
            .implant { fill: #20c997; }
            .bridge { fill: #795548; }
            .has-notes { stroke: #ff0000; stroke-width: 3; }
        </style>
        <path id="primary-tooth-shape" d="M50 5 C25 5 10 24 10 52 C10 68 17 82 22 96 C27 112 28 132 34 152 C38 166 46 176 55 176 C66 176 67 149 74 128 C78 116 84 112 90 128 C97 149 98 176 109 176 C118 176 126 166 130 152 C136 132 137 112 142 96 C147 82 154 68 154 52 C154 24 139 5 114 5 C102 5 95 10 82 10 C69 10 62 5 50 5 Z"/>
    </defs>

